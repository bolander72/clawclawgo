name: Refresh Registry

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh kit metadata from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read each kit's repoUrl, fetch fresh metadata, update in-place
          tmp=$(mktemp)
          cp registry/kits.json "$tmp"

          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('$tmp', 'utf8'));

          (async () => {
            for (const kit of data.kits) {
              if (!kit.repoUrl) continue;
              const repoPath = kit.repoUrl.replace('https://github.com/', '');
              try {
                const res = await fetch('https://api.github.com/repos/' + repoPath, {
                  headers: {
                    'Accept': 'application/vnd.github.v3+json',
                    'User-Agent': 'ClawClawGo',
                    'Authorization': 'Bearer ' + process.env.GH_TOKEN,
                  }
                });
                if (!res.ok) { console.error('Skip', repoPath, res.status); continue; }
                const repo = await res.json();
                kit.name = repo.name;
                kit.description = repo.description || kit.description;
                kit.owner = repo.owner.login;
                kit.stars = repo.stargazers_count;
                kit.forks = repo.forks_count;
                kit.createdAt = repo.created_at;
                kit.pushedAt = repo.pushed_at;
                kit.defaultBranch = repo.default_branch;
                console.log('Updated', repoPath, '★', repo.stargazers_count);
              } catch (e) { console.error('Error', repoPath, e.message); }
            }
            data.updatedAt = new Date().toISOString();
            fs.writeFileSync('registry/kits.json', JSON.stringify(data, null, 2) + '\n');
          })();
          "

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet registry/kits.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/kits.json
          git commit -m "chore: refresh registry metadata [automated]"
          git push
